<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>弹幕背景板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    }

    #danmu-container {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    /* 弹幕行 */
    .danmu-line {
      position: absolute;
      white-space: nowrap;
      font-size: 24px;
      color: #ffffff;
      font-weight: 600;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 4px rgba(0,0,0,0.7);
      will-change: transform;
      letter-spacing: 1px;
    }

    /* 右下角信息 */
    #info-bar {
      position: fixed; bottom: 20px; right: 24px;
      z-index: 100; display: flex; align-items: center; gap: 16px;
      pointer-events: auto;
    }
    #qrcode-box {
      background: #fff; padding: 6px; border-radius: 8px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    #qrcode-box img { width: 96px; height: 96px; display: block; }
    #qrcode-label { color: #aaa; font-size: 11px; text-align: center; margin-top: 4px; }
    #stats { color: #666; font-size: 13px; text-align: right; line-height: 1.8; }
    #stats span { color: #999; font-weight: bold; }
  </style>
</head>
<body>
  <div id="danmu-container"></div>

  <div id="info-bar">
    <div id="stats">
      <div>弹幕总数 <span id="count">0</span></div>
      <div style="font-size:10px;color:#444;">扫码发送 →</div>
    </div>
    <div id="qrcode-box">
      <img id="qrcode-img" src="" alt="二维码">
      <div id="qrcode-label">📱 扫码发弹幕</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const container = document.getElementById('danmu-container');
    const countEl = document.getElementById('count');
    const socket = io();

    const TRACK_COUNT = 10;
    const FONT_SIZE = 24;
    const BASE_SPEED = 100;

    function getTrackHeight() {
      return window.innerHeight / TRACK_COUNT;
    }

    let trackTimers = new Array(TRACK_COUNT).fill(0);

    window.addEventListener('resize', () => {
      trackTimers = new Array(TRACK_COUNT).fill(0);
    });

    let historyPool = [];
    let historyIndex = 0;

    function getNextHistory() {
      if (historyPool.length === 0) return null;
      const item = historyPool[historyIndex % historyPool.length];
      historyIndex++;
      return item;
    }

    function createDanmu(text) {
      const el = document.createElement('div');
      el.className = 'danmu-line';
      el.textContent = text;

      const trackHeight = getTrackHeight();
      const now = performance.now();
      let track = 0;
      let earliest = trackTimers[0];
      for (let i = 1; i < TRACK_COUNT; i++) {
        if (trackTimers[i] < earliest) {
          earliest = trackTimers[i];
          track = i;
        }
      }

      el.style.top = track * trackHeight + (trackHeight - FONT_SIZE) / 2 + 'px';
      container.appendChild(el);

      const textWidth = el.offsetWidth;
      const screenWidth = window.innerWidth;
      const totalDistance = screenWidth + textWidth;
      const duration = (totalDistance / BASE_SPEED) * 1000;

      trackTimers[track] = now + duration + 400;

      const startTime = now;
      function animate(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const x = screenWidth - (totalDistance * progress);
        el.style.transform = `translateX(${x}px)`;
        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          el.remove();
        }
      }
      requestAnimationFrame(animate);
    }

    let loopTimer = null;
    function startLoop() {
      if (loopTimer) clearInterval(loopTimer);
      loopTimer = setInterval(() => {
        if (historyPool.length > 0) {
          const item = getNextHistory();
          if (item) createDanmu(item.text);
        }
      }, 1800);
    }

    socket.on('history', (list) => {
      historyPool = list;
      historyIndex = 0;
      for (let i = 0; i < Math.min(list.length, 8); i++) {
        const item = getNextHistory();
        if (item) setTimeout(() => createDanmu(item.text), i * 300);
      }
      startLoop();
    });

    socket.on('danmu', (data) => {
      createDanmu(data.text);
      historyPool.push({ text: data.text, color: '#ffffff' });
    });

    socket.on('count', (data) => {
      countEl.textContent = data.count || data;
    });

    fetch('/qrcode')
      .then(r => r.json())
      .then(d => {
        document.getElementById('qrcode-img').src = d.qrcode;
      })
      .catch(() => {
        document.getElementById('qrcode-label').textContent = '二维码加载失败';
      });
  </script>
</body>
</html>
