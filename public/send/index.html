<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>发送弹幕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #111; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 28px 22px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .title {
      text-align: center; font-size: 20px; color: #ddd;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center; font-size: 13px; color: #666;
      margin-bottom: 20px;
    }

    #danmu-input {
      width: 100%; padding: 14px;
      font-size: 16px; background: #222; border: 1px solid #333;
      border-radius: 12px; color: #fff; outline: none;
      margin-bottom: 16px; resize: none;
    }
    #danmu-input:focus { border-color: #fff; }

    .hint {
      font-size: 12px; color: #555; margin-bottom: 16px;
      text-align: center; line-height: 1.6;
    }

    #send-btn {
      width: 100%; padding: 14px; font-size: 17px; font-weight: bold;
      background: #fff; color: #000; border: none;
      border-radius: 12px; cursor: pointer;
      transition: opacity 0.2s;
    }
    #send-btn:active { opacity: 0.7; }
    #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    #status {
      text-align: center; margin-top: 14px; font-size: 13px;
      min-height: 20px; transition: color 0.3s;
    }
    .status-ok { color: #4ade80; }
    .status-error { color: #f87171; }
    .status-info { color: #666; }

    .count-badge {
      text-align: center; margin-bottom: 12px;
    }
    .count-badge span {
      display: inline-block; background: #222; color: #888;
      padding: 4px 14px; border-radius: 20px; font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">📺 发送弹幕到大屏</div>
    <div class="subtitle">文明发言，守护未成年人</div>

    <div class="count-badge"><span id="remain-count">剩余 3 条</span></div>

    <textarea id="danmu-input" rows="2" placeholder="输入弹幕内容..." maxlength="80"></textarea>

    <div class="hint">
      ⚠️ 请文明发言，系统自动过滤不良信息<br>
      每个设备最多发送 3 条弹幕
    </div>

    <button id="send-btn">发 送</button>
    <div id="status"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const input = document.getElementById('danmu-input');
    const sendBtn = document.getElementById('send-btn');
    const statusEl = document.getElementById('status');
    const remainEl = document.getElementById('remain-count');

    let remainCount = 3;

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status-' + type;
    }

    function updateRemain() {
      remainEl.textContent = '剩余 ' + remainCount + ' 条';
      if (remainCount <= 0) {
        sendBtn.disabled = true;
        sendBtn.textContent = '已达上限';
        input.disabled = true;
        input.placeholder = '已发送 3 条，无法再发';
      }
    }

    function sendDanmu() {
      const text = input.value.trim();
      if (!text) {
        setStatus('请输入内容', 'error');
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = '发送中...';
      setStatus('', 'info');

      socket.emit('danmu', { text });

      setTimeout(() => {
        remainCount--;
        updateRemain();
        sendBtn.textContent = remainCount > 0 ? '发 送' : '已达上限';
        if (remainCount > 0) sendBtn.disabled = false;
        input.value = '';
        input.focus();
      }, 300);
    }

    sendBtn.addEventListener('click', sendDanmu);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendDanmu();
      }
    });

    socket.on('error_msg', (msg) => {
      setStatus(msg, 'error');
      sendBtn.disabled = remainCount <= 0;
      sendBtn.textContent = remainCount > 0 ? '发 送' : '已达上限';
    });

    socket.on('danmu', () => {
      setStatus('✅ 发送成功！', 'ok');
    });
  </script>
</body>
</html>
